---
layout: default
---
<div class="post">
  <br>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}
		<span class="post-meta-tags">
	      {% for tag in page.tags%}
	        <span class="tag">{{tag}}</span>
	      {%endfor%}
	    </span>
    </p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>
  <footer>
    <div class="dashang" style="text-align: center;">
      <div class="img">
        <img src="http://7vzt96.com1.z0.glb.clouddn.com/zizhuwo.jpg?imageMogr2/auto-orient/thumbnail/x250/blur/1x0/quality/55|imageslim">
      </div>
      <button class="btn">打赏</button>
    </div>
    <script type="text/javascript">
      $(function(){
        $(".dashang").find(".btn").hover(function(){
          $(".dashang").find(".img").show(200)
        })
        $(".dashang").find(".btn").mouseleave(function(){
          $(".dashang").find(".img").hide(200)
        })
      })
    </script>
  </footer>
</div>
